# codecov.io config. Activated only once the codecov GitHub App is wired
# (deferred to the CI phase). Until then this file is dormant policy.
#
# Spec refs:
#   - docs/architecture/01-principles.md (Law 12)
#   - docs/guides/testing/coverage.md

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
        base: auto
        if_ci_failed: error
        informational: false
        only_pulls: false
    patch:
      default:
        target: auto
        threshold: 1%
        base: auto
        if_ci_failed: error

comment:
  layout: "reach, diff, flags"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

# Per-flag thresholds match the per-crate floors in
# docs/guides/testing/coverage.md §"Coverage floors". Flags are emitted by
# cargo-llvm-cov via --output-path flags / per-crate uploads.
flags:
  core:
    paths:
      - crates/nexus-core/
      - crates/nexus-hal/
  systems:
    paths:
      - crates/nexus-renderer/
      - crates/nexus-physics/
      - crates/nexus-audio/
      - crates/nexus-net/
      - crates/nexus-assets/
      - crates/nexus-script/
  agent:
    paths:
      - crates/nexus-agent/
      - crates/sdks/
  editor_cli:
    paths:
      - crates/nexus-editor/
      - crates/nexus-cli/
  genres_styles:
    paths:
      - crates/genres/
      - crates/styles/

ignore:
  - "**/examples/**"
  - "**/benches/**"
  - "**/fuzz/**"
  - "**/tests/integration/**"
  - "**/*.gen.rs"
  - "target/**"
  - "games/**"   # scenario-covered, not line-covered
